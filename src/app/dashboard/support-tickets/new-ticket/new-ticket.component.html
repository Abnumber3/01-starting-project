<form (ngSubmit)="onSubmit()" action="">
    <p>
        <label for="">Title</label>
        <input name="title" id="title"#titleInput>
    </p>
    <p>
        <label for="">Request</label>
        <textarea name="request" id="request"  rows="3"></textarea>
    </p>
    <p>
        <button>
          <span>
            Submit
          </span>
          <span class="icon">
          </span>
        </button>
    </p>
</form>
